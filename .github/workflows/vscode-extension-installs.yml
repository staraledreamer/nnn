name: Real VS Code + Extension Installs

on:
  workflow_dispatch:

jobs:
  vscode-install-farm:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y snapd wget gpg apt-transport-https software-properties-common
          
      - name: Install VS Code and Extension (1000x)
        run: |
          # Install VS Code once
          sudo snap install code --classic
          
          # Counter for tracking
          success=0
          failed=0
          
          for i in $(seq 1 1000); do
            echo "========================================"
            echo "Iteration $i/1000"
            echo "========================================"
            
            # Install extension - don't verify each time
            code --install-extension LeiaBalan.luauLink --force
            
            # Just count successful installs
            echo "✅ Iteration $i: INSTALLED"
            ((success++))
            
            echo ""
          done
          
          echo "========================================"
          echo "🎉 FINAL RESULTS"
          echo "========================================"
          echo "✅ Total Installations: $success/1000"
          echo "========================================"
