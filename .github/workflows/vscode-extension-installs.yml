name: Real VS Code + Extension Installs

on:
  workflow_dispatch:

jobs:
  vscode-install-farm:
    runs-on: ubuntu-latest
    steps:
      - name: Install VS Code and Extension (1000x)
        run: |
          for i in $(seq 1 1000); do
            echo "========================================"
            echo "Iteration $i/1000"
            echo "========================================"
            
            # Install VS Code
            sudo wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg
            sudo install -o root -g root -m 644 packages.microsoft.gpg /etc/apt/trusted.gpg.d/
            sudo sh -c 'echo "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/trusted.gpg.d/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" > /etc/apt/sources.list.d/vscode.list'
            sudo apt-get update -qq
            sudo apt-get install -y code
            
            # Install extension
            echo "Installing LeiaBalan.luauLink..."
            code --install-extension LeiaBalan.luauLink --force
            
            # Verify
            if code --list-extensions | grep -q luauLink; then
              echo "✅ Iteration $i: SUCCESS"
            else
              echo "❌ Iteration $i: FAILED"
            fi
            
            echo ""
          done
          echo "🎉 All 1000 installations complete!"
