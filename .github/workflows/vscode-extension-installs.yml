- name: Install leiabalan.luaulink (${{ needs.setup.outputs.per_job }} times)
        continue-on-error: true
        timeout-minutes: 30
        run: |
          set +e
          EXT_ID="leiabalan.luaulink"
          ITERATIONS=${{ needs.setup.outputs.per_job }}
          JOB_ID=${{ matrix.job_id }}
          success=0
          fail=0

          IFACE=$(ip route get 1.1.1.1 2>/dev/null | grep -oP 'dev \K\S+' | head -1)
          echo "🌐 Network interface: $IFACE"

          for i in $(seq 1 "$ITERATIONS"); do
            DATA_DIR="/tmp/vscode-data-${JOB_ID}-${i}"
            EXT_DIR="/tmp/vscode-ext-${JOB_ID}-${i}"

            echo "--- Job $JOB_ID | Attempt $i/$ITERATIONS ---"

            # ── STEP 1: Kill leftover VS Code processes ──────────────────────
            pkill -9 -f "code" 2>/dev/null || true
            sleep 0.3

            # ── STEP 2: Random valid locally-administered MAC ────────────────
            NEW_MAC=$(printf '02:%02x:%02x:%02x:%02x:%02x' \
              $((RANDOM % 256)) \
              $((RANDOM % 256)) \
              $((RANDOM % 256)) \
              $((RANDOM % 256)) \
              $((RANDOM % 256)))
            echo "🔀 Spoofing MAC to: $NEW_MAC"

            # ── STEP 3: Change MAC WITHOUT bringing interface down ───────────
            # Do NOT use ip link set down — it kills the GitHub runner connection
            sudo ip link set dev "$IFACE" address "$NEW_MAC" 2>/dev/null || true
            # Verify it took
            ip link show "$IFACE" | grep -o 'link/ether [^ ]*' || true

            # ── STEP 4: Fresh UUID ───────────────────────────────────────────
            NEW_UUID=$(cat /proc/sys/kernel/random/uuid)
            mkdir -p "$DATA_DIR"
            echo "$NEW_UUID" > "$DATA_DIR/machineid"
            echo "🆔 UUID: $NEW_UUID"

            # ── STEP 5: Install ──────────────────────────────────────────────
            timeout 15 code \
              --install-extension "$EXT_ID" \
              --force \
              --no-sandbox \
              --disable-updates \
              --user-data-dir "$DATA_DIR" \
              --extensions-dir "$EXT_DIR" \
              2>/dev/null

            # ── STEP 6: Wait for telemetry ping ─────────────────────────────
            sleep 3

            # ── STEP 7: Verify ───────────────────────────────────────────────
            if timeout 5 code \
              --list-extensions \
              --no-sandbox \
              --user-data-dir "$DATA_DIR" \
              --extensions-dir "$EXT_DIR" \
              2>/dev/null | grep -qi "leiabalan"; then
              success=$((success + 1))
              echo "✅ Job $JOB_ID attempt $i OK (total: $success)"
            else
              fail=$((fail + 1))
              echo "❌ Job $JOB_ID attempt $i FAILED (fails: $fail)"
            fi

            # ── STEP 8: Wipe ─────────────────────────────────────────────────
            pkill -9 -f "code" 2>/dev/null || true
            rm -rf "$DATA_DIR" "$EXT_DIR"

          done

          echo "======================================="
          echo "Job $JOB_ID DONE"
          echo "✅ Succeeded: $success/$ITERATIONS"
          echo "❌ Failed:    $fail/$ITERATIONS"
          echo "======================================="
