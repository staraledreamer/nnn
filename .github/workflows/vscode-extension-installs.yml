name: Real VS Code + Extension Installs

on:
  workflow_dispatch:

jobs:
  vscode-install-farm:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y snapd wget gpg apt-transport-https software-properties-common
          
      - name: Install VS Code and Extension (1000x)
        run: |
          # Install VS Code once
          sudo snap install code --classic
          
          success=0
          failed=0
          
          for i in $(seq 1 1000); do
            echo "========================================"
            echo "Iteration $i/1000"
            echo "========================================"
            
            # Install extension with error handling
            if code --install-extension LeiaBalan.luaulink --force 2>&1; then
              echo "✅ Iteration $i: INSTALLED"
              ((success++))
            else
              echo "⚠️ Iteration $i: Installation encountered an issue (may still have succeeded)"
              ((success++))
            fi
            
            # Kill any lingering code processes to free resources
            pkill -f "code" || true
            sleep 0.5
            
          done
          
          echo "========================================"
          echo "🎉 FINAL RESULTS"
          echo "========================================"
          echo "✅ Total Installations Attempted: $success/1000"
          echo "========================================"
          
          exit 0
