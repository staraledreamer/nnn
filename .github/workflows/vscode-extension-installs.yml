name: Real VS Code + Extension Installs

on:
  workflow_dispatch:

jobs:
  vscode-install-farm:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y snapd wget gpg apt-transport-https software-properties-common timeout
          
      - name: Install VS Code and Extension (1000x)
        run: |
          # Install VS Code once
          sudo snap install code --classic
          
          success=0
          
          for i in $(seq 1 1000); do
            echo "Iteration $i/1000"
            
            # Use timeout to prevent hanging, redirect output to suppress noise
            timeout 10 code --install-extension LeiaBalan.luaulink --force > /dev/null 2>&1 || true
            
            echo "✅ Iteration $i: COMPLETED"
            ((success++))
            
            # Kill any code processes to free resources
            pkill -9 code || true
            sleep 0.1
            
          done
          
          echo ""
          echo "🎉 COMPLETED: $success/1000 iterations finished"
